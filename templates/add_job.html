<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 📱 Extra mobile optimization */
        @media (max-width: 480px) {
            .container {
                margin: 30px auto;
                padding: 15px;
            }

            h2 {
                font-size: 20px;
            }

            input, textarea {
                font-size: 13px;
                padding: 10px;
            }

            button {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">

<h2>Add Job</h2>

<form method="post" action="/save_job">

    <input type="text" name="title" placeholder="Job Title" required><br><br>

    <input type="text" name="company" placeholder="Company" required><br><br>

    <input type="text" name="location" placeholder="Location" required><br><br>

    <textarea name="description" placeholder="Job Description" required></textarea><br><br>

    <button type="submit">Post Job</button>

</form>

<a href="/dashboard">⬅ Back</a>

</div>

</body>
</html>
