<!DOCTYPE html>
<html>
<head>
    <title>All Applications</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 30px auto;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        p {
            margin: 5px 0;
            font-size: 14px;
        }

        b {
            color: #333;
        }

        a {
            text-decoration: none;
            color: #5b86e5;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .status {
            font-weight: bold;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: white;
            font-weight: bold;
        }

        .back:hover {
            text-decoration: underline;
        }

        hr {
            display: none;
        }

        /* 📱 Mobile optimization */
        @media (max-width: 480px) {

            h2 {
                font-size: 18px;
            }

            p {
                font-size: 13px;
            }

            .card {
                padding: 12px;
            }
        }
    </style>
</head>

<body>

<div class="container">

<h2>All Applications (Admin)</h2>

{% for a in applications %}

    <div class="card">

        <p><b>User:</b> {{a[1]}}</p>

        <p><b>Job ID:</b> {{a[2]}}</p>

        <p>
            <a href="/resumes/{{a[3]}}">
                📄 Download Resume
            </a>
        </p>

        <p><b>Status:</b> <span class="status">{{a[4]}}</span></p>

    </div>

{% endfor %}

<a class="back" href="/dashboard">⬅ Back</a>

</div>

</body>
</html>
