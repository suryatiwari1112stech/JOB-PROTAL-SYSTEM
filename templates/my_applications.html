<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #43cea2, #185a9d);
            margin: 0;
            padding: 0;
        }

        .container {
            padding: 15px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        p {
            margin: 6px 0;
            font-size: 14px;
            color: #333;
        }

        b {
            color: #000;
        }

        .status {
            font-weight: bold;
            color: #185a9d;
        }

        .back {
            display: block;
            text-align: center;
            margin: 20px 0;
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }

        hr {
            display: none;
        }

        /* 📱 Mobile optimization */
        @media (max-width: 480px) {
            p {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<div class="container">

<h2>My Applications</h2>

{% for a in applications %}

    <div class="card">

        <p><b>Job ID:</b> {{a[2]}}</p>

        <p><b>Resume:</b> {{a[3]}}</p>

        <p><b>Status:</b> <span class="status">{{a[4]}}</span></p>

    </div>

{% endfor %}

<a class="back" href="/dashboard">⬅ Back</a>

</div>

</body>
</html>
